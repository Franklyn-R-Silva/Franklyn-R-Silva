name: generate animation

on:
  # run automatically every 24 hours (daily at 00:00 UTC)
  schedule:
    - cron: "0 0 * * *"
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main branch
  push:
    branches:
    - main
    
  

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
          
      # push the content of <build_dir> to a branch
      # the content will be available at https://raw.githubusercontent.com/<github_user>/<repository>/<target_branch>/<file> , or as github page
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # regenerate the terminal profile card so its dynamic data (uptime / sync date)
  # stays fresh. Skipped on push to avoid the bot's own commit re-triggering the run.
  refresh-card:
    if: github.event_name != 'push'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pillow
      - name: rebuild dark.svg / light.svg
        run: python scripts/build_profile.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}       # higher API rate limit + reliable search
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}  # optional: adds the WakaTime row
      - name: commit if the card changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark.svg light.svg
          git diff --staged --quiet || git commit -m "chore: daily profile card refresh"
          git push
